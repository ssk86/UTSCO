_BASE_: "./Base-RCNN-C4.yaml"
MODEL:
  # META_ARCHITECTURE: "TwoStagePseudoLabGeneralizedRCNN"
  
  META_ARCHITECTURE: "DAobjTwoStagePseudoLabGeneralizedRCNN"
  #WEIGHTS: /workspace/ssk1/adaptive_teacher-main/output/faster_rcnn_R101_cross_drop_ins_pre/model_0002999.pth
  # WEIGHTS: "/workspace/ssk1/adapteacher_main/output/faster_rcnn_R101_cross_pre_drop_ins/model_0009999.pth"
  WEIGHTS: "detectron2://ImageNetPretrained/MSRA/R-101.pkl"
  # WEIGHTS: "/workspace/ssk1/adapteacher_main/output/faster_rcnn_R101_cross_ins_damage_pre/model_0006899.pth"
  LOAD_PROPOSALS: False
  KEYPOINT_ON: False
  MASK_ON: False
  RESNETS:
    DEPTH: 101
  PROPOSAL_GENERATOR:
    NAME: "PseudoLabRPN"

  # RPN:
  #   POSITIVE_FRACTION: 0.25
  
  ROI_HEADS:
    NAME: "StandardROIHeadsPseudoLab"
    LOSS: "CrossEntropy" # variant: "CrossEntropy"
    NUM_CLASSES: 1
  ROI_BOX_HEAD:
    NAME: "FastRCNNConvFCHead"
    NUM_FC: 2
    POOLER_RESOLUTION: 7
SOLVER:
  LR_SCHEDULER_NAME: WarmupTwoStageMultiStepLR
  STEPS: (8000, 10000, 15000, 20000)
  #STEPS: (8000, 15000, 20000, 30000)
  FACTOR_LIST: (0.7, 0.02, 0.02, 0.02, 0.02)
  #0.7 0.02 0.02 0.02 0.02之前
  MAX_ITER: 50000
  #20000
  IMG_PER_BATCH_LABEL: 1
  CHECKPOINT_PERIOD: 1000
  IMG_PER_BATCH_UNLABEL: 1
  BASE_LR: 0.0038
  #0.004
DATALOADER:
  SUP_PERCENT: 100.0
  


DATASETS:
  CROSS_DATASET: True
  TRAIN:  ("source_train","target_train") 
  TRAIN_LABEL: ("source_train",) #voc_2012_train
  # TRAIN_UNLABEL: ("voc_2012_val",) #Clipart1k_train
  # TEST: ("voc_2012_val",) #Clipart1k_test
  
  TRAIN_UNLABEL: ("target_train",) #Clipart1k_train
  TEST: ("target_val",) #Clipart1k_test


SEMISUPNET:
  
  Trainer: "ateacher"
  # "ateacher"阈值改回去了
  BBOX_THRESHOLD: 0.8
  TEACHER_UPDATE_ITER: 2
  #BURN_UP_STEP: 7499
  BURN_UP_STEP: 10000
  EMA_KEEP_RATE: 0.9996
  UNSUP_LOSS_WEIGHT: 0.8 # 1.0 is suboptimal 之前0.8
  SUP_LOSS_WEIGHT: 1.0
  DIS_TYPE: "res4" #["concate","p2","multi"]
  DIS_LOSS_WEIGHT: 0.5 #之前0.3
  INS_LOSS_WEIGHT: 0.1
  TAU_MIN: 0.0
  TAU_MAX: 0.1
  TAU_GAMMA: 2.0

#权重不知道改设置成多少

TEST:
  EVAL_PERIOD: 1000
OUTPUT_DIR: ./output/hhhhhhhhhhhhhhhhhtestdamage_final123

#域训练好了之后再跑蒸馏和lpl